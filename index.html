<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Quiz Practice</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg:        #f0f2f8;
            --surface:   #ffffff;
            --surface2:  #f5f6fb;
            --border:    #e2e5f0;
            --border2:   #cdd1e5;
            --accent:    #5b4ff0;
            --accent-lo: rgba(91,79,240,0.08);
            --accent-glow: rgba(91,79,240,0.20);
            --cyan:      #0099bb;
            --cyan-lo:   rgba(0,153,187,0.08);
            --green:     #00a870;
            --green-lo:  rgba(0,168,112,0.10);
            --red:       #e03355;
            --red-lo:    rgba(224,51,85,0.09);
            --text:      #1a1d2e;
            --text-dim:  #5a6080;
            --text-muted:#9aa0bc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 28px 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 24px 28px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-lo);
            border: 1px solid var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .logo h1 { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
        .logo p  { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        .nav-section { padding: 20px 16px 0; }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            text-align: left;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: var(--accent-lo); color: var(--accent); border: 1px solid rgba(124,107,255,0.3); }
        .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
        .nav-item .nav-count {
            margin-left: auto;
            background: var(--surface2);
            color: var(--text-dim);
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
        }
        .nav-item.active .nav-count { background: var(--accent-lo); color: var(--accent); }

        .sidebar-footer {
            margin-top: auto;
            padding: 20px 16px 0;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            text-align: left;
            transition: all 0.2s;
            margin-bottom: 6px;
        }

        .action-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .action-btn.primary:hover { background: #6a5aef; box-shadow: 0 0 20px var(--accent-glow); }

        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left { display: flex; flex-direction: column; gap: 4px; }
        .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
        .topbar-sub { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

        .progress-wrap { display: flex; align-items: center; gap: 12px; }
        .progress-label { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
        .progress-bar-outer { width: 160px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--cyan));
            border-radius: 99px;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .score-banner {
            display: none;
            margin: 24px 32px 0;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 20px 28px;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 12px rgba(91,79,240,0.08);
        }
        .score-banner.show { display: flex; }

        .score-big {
            font-size: 36px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .score-meta { display: flex; flex-direction: column; gap: 4px; }
        .score-label { font-size: 14px; color: var(--text-dim); }
        .score-emoji { font-size: 22px; }

        .content { padding: 24px 32px 48px; display: flex; flex-direction: column; gap: 16px; }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
            animation: fadeUp 0.3s ease both;
        }
        .question-card:hover { border-color: var(--border2); }

        .card-header { display: flex; align-items: center; gap: 12px; padding: 18px 22px 0; }
        .q-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-lo);
            border: 1px solid rgba(124,107,255,0.25);
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .q-type-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 6px;
        }
        .q-status {
            margin-left: auto;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .q-status.answered  { opacity: 1; background: var(--accent-lo); color: var(--accent); }
        .q-status.correct-q { opacity: 1; background: var(--green-lo);  color: var(--green); }
        .q-status.wrong-q   { opacity: 1; background: var(--red-lo);    color: var(--red); }

        .question-text { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.6; padding: 14px 22px 18px; }

        .options { padding: 0 22px 20px; display: flex; flex-direction: column; gap: 8px; }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface2);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .option::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background 0.2s; }
        .option:hover { border-color: var(--border2); }
        .option:hover::before { background: var(--accent); }
        .option input[type="radio"], .option input[type="checkbox"] { display: none; }
        .option-bullet {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border2);
            background: transparent;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 10px;
        }
        .option-bullet.checkbox-style { border-radius: 5px; }
        .option label { font-size: 14px; color: var(--text-dim); cursor: pointer; flex: 1; line-height: 1.4; transition: color 0.2s; }
        .option:hover label { color: var(--text); }

        .option.selected { border-color: rgba(124,107,255,0.4); background: var(--accent-lo); }
        .option.selected::before { background: var(--accent); }
        .option.selected .option-bullet { border-color: var(--accent); background: var(--accent); color: white; }
        .option.selected label { color: var(--text); }

        .option.correct { border-color: rgba(0,229,160,0.4); background: var(--green-lo); }
        .option.correct::before { background: var(--green); }
        .option.correct .option-bullet { border-color: var(--green); background: var(--green); color: #0d0f14; }
        .option.correct label { color: var(--text); }

        .option.incorrect { border-color: rgba(255,77,109,0.4); background: var(--red-lo); }
        .option.incorrect::before { background: var(--red); }
        .option.incorrect .option-bullet { border-color: var(--red); background: var(--red); color: white; }
        .option.incorrect label { color: var(--text); }

        .dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .dropdown-item span { font-size: 14px; color: var(--text-dim); }
        .dropdown-item select {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 7px;
            color: var(--text);
            font-size: 13px;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            min-width: 55px;
        }
        .dropdown-item select option { background: var(--surface); color: var(--text); }
        .dropdown-item.correct  { border-color: rgba(0,229,160,0.4); background: var(--green-lo); }
        .dropdown-item.correct span  { color: var(--text); }
        .dropdown-item.incorrect { border-color: rgba(255,77,109,0.4); background: var(--red-lo); }
        .dropdown-item.incorrect span { color: var(--text); }

        .answer-section {
            display: none;
            margin: 0 22px 20px;
            padding: 14px 16px;
            background: rgba(0,229,255,0.06);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 10px;
        }
        .answer-section.show { display: block; }
        .answer-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cyan); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .explanation { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

        .btn-check-wrap { padding: 0 22px 20px; }
        .btn-check {
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            padding: 9px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-check:hover { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .topbar { padding: 14px 18px; }
            .content { padding: 16px 18px 40px; }
            .score-banner { margin: 16px 18px 0; }
            .mobile-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 18px; gap: 8px; overflow-x: auto; }
        }
        @media (min-width: 769px) { .mobile-nav { display: none; } }

        .mobile-nav-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .mobile-nav-btn.active, .mobile-nav-btn:hover { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🌐</div>
            <h1>IoT Quiz</h1>
            <p>Practice Mode</p>
        </div>

        <div class="nav-section">
            <div class="nav-label">Topics</div>
            <button class="nav-item active" onclick="switchTopic(0)" id="nav-0">
                <span class="nav-icon">📡</span>
                Intro to IoT
                <span class="nav-count" id="count-0">10</span>
            </button>
            <button class="nav-item" onclick="switchTopic(1)" id="nav-1">
                <span class="nav-icon">🔗</span>
                HTTP &amp; REST
                <span class="nav-count" id="count-1">14</span>
            </button>
            <button class="nav-item" onclick="switchTopic(2)" id="nav-2">
                <span class="nav-icon">o0o</span>
                CoAP &amp; MQTT
                <span class="nav-count" id="count-2">24</span>
            </button>
            <button class="nav-item" onclick="switchTopic(3)" id="nav-3">
                <span class="nav-icon">🕸️</span>
                Wireless Mesh
                <span class="nav-count" id="count-3">17</span>
            </button>
            <button class="nav-item" onclick="switchTopic(4)" id="nav-4">
                <span class="nav-icon">📻</span>
                LoRa &amp; LoRaWAN
                <span class="nav-count" id="count-4">16</span>
            </button>
            <button class="nav-item" onclick="switchTopic(5)" id="nav-5">
                <span class="nav-icon">📶</span>
                Z-Wave &amp; ZigBee
                <span class="nav-count" id="count-5">12</span>
            </button>
            <button class="nav-item" onclick="switchTopic(6)" id="nav-6">
                <span class="nav-icon">☁️</span>
                AIoT &amp; Cloud
                <span class="nav-count" id="count-6">14</span>
            </button>
        </div>

        <div class="sidebar-footer">
            <button class="action-btn primary" onclick="checkAnswers()">⚡ Check Answers</button>
            <button class="action-btn" onclick="shuffleQuestions()">🔀 Shuffle</button>
            <button class="action-btn" onclick="toggleAnswers()">💡 Toggle Answers</button>
            <button class="action-btn" onclick="resetQuiz()">↺ Reset</button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- Mobile nav -->
        <div class="mobile-nav">
            <button class="mobile-nav-btn active" onclick="switchTopic(0)" id="mnav-0">📡 Intro to IoT</button>
            <button class="mobile-nav-btn" onclick="switchTopic(1)" id="mnav-1">🔗 HTTP &amp; REST</button>
            <button class="mobile-nav-btn" onclick="switchTopic(2)" id="mnav-2">o0o CoAP &amp; MQTT</button>
            <button class="mobile-nav-btn" onclick="switchTopic(3)" id="mnav-3">🕸️ Wireless Mesh</button>
            <button class="mobile-nav-btn" onclick="switchTopic(4)" id="mnav-4">📻 LoRa &amp; LoRaWAN</button>
            <button class="mobile-nav-btn" onclick="switchTopic(5)" id="mnav-5">📶 Z-Wave &amp; ZigBee</button>
            <button class="mobile-nav-btn" onclick="switchTopic(6)" id="mnav-6">☁️ AIoT &amp; Cloud</button>
            <button class="mobile-nav-btn" onclick="checkAnswers()">⚡ Check</button>
            <button class="mobile-nav-btn" onclick="shuffleQuestions()">🔀 Shuffle</button>
            <button class="mobile-nav-btn" onclick="toggleAnswers()">💡 Answers</button>
            <button class="mobile-nav-btn" onclick="resetQuiz()">↺ Reset</button>
        </div>

        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <span class="topbar-title" id="topbar-title">Introduction to IoT</span>
                <span class="topbar-sub" id="topbar-sub">0 / 10 answered</span>
            </div>
            <div class="progress-wrap">
                <span class="progress-label" id="progress-label">0%</span>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
                </div>
            </div>
        </div>

        <!-- Score banner -->
        <div class="score-banner" id="score">
            <div class="score-big" id="score-pct">—</div>
            <div class="score-meta">
                <div class="score-label" id="score-label">–</div>
                <div class="score-emoji" id="score-emoji"></div>
            </div>
        </div>

        <!-- Questions -->
        <div class="content" id="quiz-container"></div>
    </div>
</div>

<script>
// ── TOPIC 0: Intro to IoT ──────────────────────────────────────────────────
const iotQuestions = [
    {
        question: "Arrange the various layers for the IoT Reference Model, assuming the following sequence:<br>7. Collaboration &amp; Processes<br>6. Application<br>...",
        type: 'dropdown',
        items: [
            { name: "Edge Computing",                correct: 3 },
            { name: "Connectivity",                  correct: 2 },
            { name: "Physical Devices & Controller", correct: 1 },
            { name: "Data Abstraction",              correct: 5 },
            { name: "Data Accumulation",             correct: 4 }
        ],
        explanation: "IoT Reference Model layers from bottom to top: 1-Physical Devices & Controller, 2-Connectivity, 3-Edge Computing, 4-Data Accumulation, 5-Data Abstraction, 6-Application, 7-Collaboration & Processes"
    },
    {
        question: "Match the following terms to the most appropriate description.",
        type: 'match',
        items: [
            { name: "Cyber-Physical Systems",          correct: 4, descriptions: ["1. Focus on anytime/anywhere computing","2. Focus on time constraints","3. Not necessarily connected","4. Focus on interaction between physical and cyber systems"] },
            { name: "Embedded Systems",                correct: 3, descriptions: ["1. Focus on anytime/anywhere computing","2. Focus on time constraints","3. Not necessarily connected","4. Focus on interaction between physical and cyber systems"] },
            { name: "Pervasive/Ubiquitous Computing",  correct: 1, descriptions: ["1. Focus on anytime/anywhere computing","2. Focus on time constraints","3. Not necessarily connected","4. Focus on interaction between physical and cyber systems"] },
            { name: "Real-time Systems",               correct: 2, descriptions: ["1. Focus on anytime/anywhere computing","2. Focus on time constraints","3. Not necessarily connected","4. Focus on interaction between physical and cyber systems"] }
        ],
        explanation: "Cyber-Physical Systems focus on physical-cyber interaction, Embedded Systems are not necessarily connected, Pervasive Computing enables anytime/anywhere computing, Real-time Systems focus on time constraints."
    },
    {
        question: "IoT refers to ... (select the best answer)",
        type: 'single',
        options: ["Interconnections of devices in a network","Exchange of data between devices in a network","An ecosystem of devices, accessible through internet","All of them"],
        correct: 3,
        explanation: "IoT encompasses interconnections, data exchange, AND the entire ecosystem of devices accessible through the internet."
    },
    {
        question: "Which of the following is NOT a component in an IoT device?",
        type: 'single',
        options: ["Power Supply","Actuator","Sensor","Controller","Communication"],
        correct: 0,
        explanation: "Power Supply is infrastructure support, not a functional component. The core IoT device components are: Sensor, Actuator, Controller, and Communication modules."
    },
    {
        question: "Which of the following technology uses 2.4GHz frequency?",
        type: 'multiple',
        options: ["Z-Wave","NB-IoT","SigFox","Bluetooth/BLE","LoRa","WiFi","Weightless","2G/3G","Wireless HART","ZigBee"],
        correct: [3, 5, 8, 9],
        explanation: "Technologies using 2.4GHz: Bluetooth/BLE, WiFi, Wireless HART, and ZigBee all operate in the 2.4GHz ISM band."
    },
    {
        question: "The various factors (range, power, data rate, scalability, security and cost) have the same level of importance in any IoT solution.",
        type: 'single',
        options: ["True","False"],
        correct: 1,
        explanation: "False — Different IoT solutions prioritize different factors based on their specific requirements and use cases."
    },
    {
        question: "Which choice represents the ultimate aim for IoT?",
        type: 'single',
        options: ["To collect as much data as possible","To connect as many 'things' together","To transform raw data into insights","To reduce network bandwidth"],
        correct: 2,
        explanation: "The ultimate aim of IoT is to transform raw data into actionable insights that drive decision-making and value creation."
    },
    {
        question: "Which of the following supports the longest range?",
        type: 'single',
        options: ["WiFi","BLE","ZigBee","LoRa"],
        correct: 3,
        explanation: "LoRa (Long Range) can support distances up to 10–15 km in rural areas, far exceeding WiFi (~100 m), BLE (~100 m), and ZigBee (~100 m)."
    },
    {
        question: "Devices in IoT support ... (select the best answer)",
        type: 'single',
        options: ["Actuating","Sensing","All of them","Data collection"],
        correct: 2,
        explanation: "IoT devices support all functions: Sensing (collecting data), Data collection (storing/transmitting), and Actuating (taking actions)."
    },
    {
        question: "Which of the following allows a bunch of heterogeneous systems to communicate and interact with each other?",
        type: 'single',
        options: ["Application","Hardware","Operating System","Middleware"],
        correct: 3,
        explanation: "Middleware acts as a bridge between heterogeneous systems, enabling communication and interaction through protocol translation and service orchestration."
    }
];

// ── TOPIC 1: HTTP & REST ───────────────────────────────────────────────────

const allTopics = [
    { label: "Introduction to IoT",  short: "Intro to IoT",      questions: iotQuestions,    icon: "📡" },
    { label: "HTTP & REST",           short: "HTTP & REST",        questions: restQuestions,   icon: "🔗" },
    { label: "CoAP & MQTT",       short: "CoAP & MQTT",   questions: CoAPMQTTQuestions, icon: "🌐" },
    { label: "Wireless Mesh",         short: "Wireless Mesh",      questions: meshQuestions,   icon: "🕸️" },
    { label: "LoRa & LoRaWAN",        short: "LoRa & LoRaWAN",    questions: loraQuestions,   icon: "📻" },
    { label: "Z-Wave & ZigBee",       short: "Z-Wave & ZigBee",   questions: zigbeeQuestions, icon: "📶" },
    { label: "AIoT & Cloud",       short: "AIoT & Cloud",   questions: aiotAndCloudQuestions, icon: "☁️" }
];

let activeTopic = 0;
let userAnswers  = [];
let showingAnswers = false;
let currentQuestions = [...iotQuestions];

// Update sidebar counts
allTopics.forEach((t, i) => {
    const el = document.getElementById(`count-${i}`);
    if (el) el.textContent = t.questions.length;
});

// ── TOPIC SWITCH ──────────────────────────────────────────────────────────
function switchTopic(idx) {
    activeTopic = idx;
    currentQuestions = [...allTopics[idx].questions];
    showingAnswers = false;
    hidScore();

    document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === idx));
    for (let i = 0; i < allTopics.length; i++) {
        document.getElementById(`mnav-${i}`)?.classList.toggle('active', i === idx);
    }

    document.getElementById('topbar-title').textContent = allTopics[idx].label;
    renderQuiz();
}

// ── PROGRESS ──────────────────────────────────────────────────────────────
function updateProgress() {
    const total = currentQuestions.length;
    const answered = userAnswers.filter((a, i) => {
        const q = currentQuestions[i];
        if (q.type === 'dropdown' || q.type === 'match') return Array.isArray(a) && a.some(v => v !== null);
        if (q.type === 'multiple') return Array.isArray(a) && a.length > 0;
        return a !== null && a !== undefined;
    }).length;

    const pct = total ? Math.round((answered / total) * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = pct + '%';
    document.getElementById('topbar-sub').textContent = `${answered} / ${total} answered`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';

    const typeLabels = { single: 'Single Choice', multiple: 'Multi Select', dropdown: 'Ordering', match: 'Matching' };

    currentQuestions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.style.animationDelay = `${index * 0.04}s`;
        card.innerHTML = `
            <div class="card-header">
                <span class="q-badge">Q${index + 1}</span>
                <span class="q-type-badge">${typeLabels[q.type] || q.type}</span>
                <span class="q-status" id="status-${index}">✓</span>
            </div>
            <div class="question-text">${q.question}</div>
            <div class="options" id="options-${index}"></div>
            ${q.type === 'multiple' ? `<div class="btn-check-wrap"><button class="btn-check" onclick="checkSingleQuestion(${index})">Check Selection</button></div>` : ''}
            <div class="answer-section" id="answer-${index}">
                <div class="answer-label">💡 Explanation</div>
                <div class="explanation">${q.explanation}</div>
            </div>
        `;
        container.appendChild(card);
        renderOptions(q, index);
    });

    userAnswers = currentQuestions.map(q => {
        if (q.type === 'dropdown' || q.type === 'match') return q.items.map(() => null);
        if (q.type === 'multiple') return [];
        return null;
    });

    updateProgress();
}

// ── RENDER OPTIONS ────────────────────────────────────────────────────────
function renderOptions(q, qi) {
    const div = document.getElementById(`options-${qi}`);

    if (q.type === 'dropdown' || q.type === 'match') {
        q.items.forEach((item, ii) => {
            const d = document.createElement('div');
            d.className = 'dropdown-item';
            d.id = `dropdown-${qi}-${ii}`;
            const max = q.type === 'dropdown' ? 5 : 4;
            let opts = '<option value="">—</option>';
            if (q.type === 'match' && item.descriptions) {
                item.descriptions.forEach((desc, i) => {
                    opts += `<option value="${i + 1}">${desc}</option>`;
                });
            } else {
                for (let i = 1; i <= max; i++) opts += `<option value="${i}">${i}</option>`;
            }
            d.innerHTML = `<span>${item.name}</span><select onchange="selectDropdown(${qi},${ii},this.value)">${opts}</select>`;
            div.appendChild(d);
        });
    } else if (q.type === 'single') {
        q.options.forEach((opt, oi) => {
            const d = document.createElement('div');
            d.className = 'option';
            d.innerHTML = `
                <input type="radio" name="q${qi}" id="q${qi}-${oi}">
                <div class="option-bullet" id="bullet-${qi}-${oi}"></div>
                <label for="q${qi}-${oi}">${opt}</label>
            `;
            d.onclick = () => { document.getElementById(`q${qi}-${oi}`).checked = true; selectOption(qi, oi); };
            div.appendChild(d);
        });
    } else if (q.type === 'multiple') {
        q.options.forEach((opt, oi) => {
            const d = document.createElement('div');
            d.className = 'option';
            d.innerHTML = `
                <input type="checkbox" name="q${qi}" id="q${qi}-${oi}" onchange="selectMultiple(${qi},${oi})">
                <div class="option-bullet checkbox-style" id="bullet-${qi}-${oi}"></div>
                <label for="q${qi}-${oi}">${opt}</label>
            `;
            d.onclick = () => { const cb = document.getElementById(`q${qi}-${oi}`); cb.checked = !cb.checked; selectMultiple(qi, oi); };
            div.appendChild(d);
        });
    }
}

// ── BULLET ICON ───────────────────────────────────────────────────────────
function setBullet(qi, oi, state) {
    const b = document.getElementById(`bullet-${qi}-${oi}`);
    if (!b) return;
    const icons = { selected: '●', correct: '✓', incorrect: '✗', default: '' };
    b.textContent = icons[state] || '';
}

// ── SELECT SINGLE ─────────────────────────────────────────────────────────
function selectOption(qi, oi) {
    const q = currentQuestions[qi];
    const inputs = document.querySelectorAll(`input[name="q${qi}"]`);
    inputs.forEach((inp, idx) => { inp.parentElement.classList.remove('selected','correct','incorrect'); setBullet(qi, idx, 'default'); });

    userAnswers[qi] = oi;
    inputs[oi].parentElement.classList.add('selected');
    setBullet(qi, oi, 'selected');

    inputs.forEach((inp, idx) => {
        if (idx === q.correct)      { inp.parentElement.classList.add('correct');   setBullet(qi, idx, 'correct'); }
        else if (idx === oi)        { inp.parentElement.classList.add('incorrect'); setBullet(qi, idx, 'incorrect'); }
    });

    document.getElementById(`answer-${qi}`).classList.add('show');
    markStatus(qi, oi === q.correct ? 'correct-q' : 'wrong-q');
    updateProgress();
}

// ── SELECT MULTIPLE ───────────────────────────────────────────────────────
function selectMultiple(qi, oi) {
    const cb = document.getElementById(`q${qi}-${oi}`);
    if (!Array.isArray(userAnswers[qi])) userAnswers[qi] = [];

    if (cb.checked) {
        if (!userAnswers[qi].includes(oi)) userAnswers[qi].push(oi);
        cb.parentElement.classList.add('selected');
        setBullet(qi, oi, 'selected');
    } else {
        userAnswers[qi] = userAnswers[qi].filter(i => i !== oi);
        cb.parentElement.classList.remove('selected');
        setBullet(qi, oi, 'default');
    }
    markStatus(qi, 'answered');
    updateProgress();
}

// ── SELECT DROPDOWN ───────────────────────────────────────────────────────
function selectDropdown(qi, ii, val) {
    if (!Array.isArray(userAnswers[qi])) userAnswers[qi] = [];
    userAnswers[qi][ii] = val ? parseInt(val) : null;
    markStatus(qi, 'answered');
    updateProgress();
}

// ── STATUS DOT ────────────────────────────────────────────────────────────
function markStatus(qi, cls) {
    const el = document.getElementById(`status-${qi}`);
    if (!el) return;
    el.className = `q-status ${cls}`;
    el.textContent = cls === 'correct-q' ? '✓' : cls === 'wrong-q' ? '✗' : '•';
}

// ── CHECK SINGLE (multi-select) ───────────────────────────────────────────
function checkSingleQuestion(qi) {
    const q = currentQuestions[qi];
    const ua = userAnswers[qi];
    const ca = q.correct;
    const inputs = document.querySelectorAll(`input[name="q${qi}"]`);

    inputs.forEach((inp, oi) => {
        inp.parentElement.classList.remove('correct','incorrect');
        setBullet(qi, oi, 'default');
        if (ca.includes(oi))                           { inp.parentElement.classList.add('correct');   setBullet(qi, oi, 'correct'); }
        else if (Array.isArray(ua) && ua.includes(oi)) { inp.parentElement.classList.add('incorrect'); setBullet(qi, oi, 'incorrect'); }
    });

    const isCorrect = Array.isArray(ua) && ua.length === ca.length && ua.every(a => ca.includes(a));
    markStatus(qi, isCorrect ? 'correct-q' : 'wrong-q');
    document.getElementById(`answer-${qi}`).classList.add('show');
}

// ── CHECK ALL ─────────────────────────────────────────────────────────────
function checkAnswers() {
    let correct = 0;
    const total = currentQuestions.length;

    currentQuestions.forEach((q, index) => {
        let ok = false;

        if (q.type === 'dropdown' || q.type === 'match') {
            ok = q.items.every((item, idx) => {
                const uv = userAnswers[index]?.[idx];
                const dd = document.getElementById(`dropdown-${index}-${idx}`);
                const match = uv === item.correct;
                dd?.classList.remove('correct','incorrect');
                dd?.classList.add(match ? 'correct' : 'incorrect');
                return match;
            });
        } else if (q.type === 'multiple') {
            const ua = userAnswers[index];
            const ca = q.correct;
            ok = Array.isArray(ua) && ua.length === ca.length && ua.every(a => ca.includes(a));
            const inputs = document.querySelectorAll(`input[name="q${index}"]`);
            inputs.forEach((inp, oi) => {
                inp.parentElement.classList.remove('correct','incorrect');
                setBullet(index, oi, 'default');
                if (ca.includes(oi))                           { inp.parentElement.classList.add('correct');   setBullet(index, oi, 'correct'); }
                else if (Array.isArray(ua) && ua.includes(oi)) { inp.parentElement.classList.add('incorrect'); setBullet(index, oi, 'incorrect'); }
            });
        } else if (q.type === 'single') {
            ok = userAnswers[index] === q.correct;
        }

        if (ok) correct++;
        markStatus(index, ok ? 'correct-q' : 'wrong-q');
        document.getElementById(`answer-${index}`)?.classList.add('show');
    });

    showingAnswers = true;
    const pct = ((correct / total) * 100).toFixed(1);
    document.getElementById('score-pct').textContent   = pct + '%';
    document.getElementById('score-label').textContent  = `${correct} out of ${total} correct`;
    document.getElementById('score-emoji').textContent  = pct >= 80 ? '🎉 Excellent!' : pct >= 60 ? '👍 Good job!' : '💪 Keep grinding!';
    document.getElementById('score').classList.add('show');
    document.getElementById('score').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── RESET ─────────────────────────────────────────────────────────────────
function resetQuiz() {
    currentQuestions.forEach((q, index) => {
        if (q.type === 'dropdown' || q.type === 'match') {
            q.items.forEach((_, ii) => {
                const sel = document.querySelector(`#dropdown-${index}-${ii} select`);
                if (sel) sel.value = '';
                document.getElementById(`dropdown-${index}-${ii}`)?.classList.remove('correct','incorrect');
            });
        } else {
            document.querySelectorAll(`input[name="q${index}"]`).forEach((inp, oi) => {
                inp.checked = false;
                inp.parentElement.classList.remove('selected','correct','incorrect');
                setBullet(index, oi, 'default');
            });
        }
        document.getElementById(`answer-${index}`)?.classList.remove('show');
        const s = document.getElementById(`status-${index}`);
        if (s) { s.className = 'q-status'; s.textContent = '✓'; }
    });

    userAnswers = currentQuestions.map(q => {
        if (q.type === 'dropdown' || q.type === 'match') return q.items.map(() => null);
        if (q.type === 'multiple') return [];
        return null;
    });

    hidScore();
    showingAnswers = false;
    updateProgress();
}

function hidScore() { document.getElementById('score').classList.remove('show'); }

// ── TOGGLE ANSWERS ────────────────────────────────────────────────────────
function toggleAnswers() {
    showingAnswers = !showingAnswers;
    currentQuestions.forEach((_, i) => {
        document.getElementById(`answer-${i}`)?.classList.toggle('show', showingAnswers);
    });
}

// ── SHUFFLE ───────────────────────────────────────────────────────────────
function shuffleQuestions() {
    currentQuestions = [...allTopics[activeTopic].questions].sort(() => Math.random() - 0.5);
    hidScore();
    showingAnswers = false;
    renderQuiz();
}

// ── INIT ──────────────────────────────────────────────────────────────────
renderQuiz();
